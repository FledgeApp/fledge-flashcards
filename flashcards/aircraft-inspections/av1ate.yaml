id: av1ate
title: "AAV1ATES Aircraft Inspections"
subtitle: "ADs, annual, VOR, 100-hour, altimeter, transponder, ELT, and static-system checks."
badge: "AAV"
accent: green
cards:
  - id: av1ate-airworthiness-directives
    prompt: "**A**AV1ATES - A"
    prompt_subtitle: "Aircraft inspection currency"
    answer: "Airworthiness directives (ADs)"
    detail: "FAA safety directives are mandatory. An overdue applicable AD generally means the aircraft is not airworthy until addressed."
  - id: av1ate-annual-inspection
    prompt: "A**A**V1ATES - A"
    prompt_subtitle: "Aircraft inspection currency"
    answer: "Annual inspection"
    detail: "Required every 12 calendar months for all civil aircraft. Must be performed by an A&P mechanic with Inspection Authorization (IA)."
  - id: av1ate-vor-check
    prompt: "AA**V**1ATES - V"
    prompt_subtitle: "Aircraft inspection currency"
    answer: "VOR check"
    detail: "Required within the preceding 30 days before using VOR equipment for IFR operations. Log the check for compliance."
  - id: av1ate-100-hour-inspection
    prompt: "AAV**1**ATES - 1"
    prompt_subtitle: "Aircraft inspection currency"
    answer: "100-hour inspection"
    detail: "Required for aircraft carrying persons for hire or used for flight instruction for hire when the instructor provides the aircraft."
  - id: av1ate-altimeter-check
    prompt: "AAV1**A**TES - A"
    prompt_subtitle: "Aircraft inspection currency"
    answer: "Altimeter check"
    detail: "Required every 24 calendar months for IFR operations under 14 CFR 91.411."
  - id: av1ate-transponder-check
    prompt: "AAV1A**T**ES - T"
    prompt_subtitle: "Aircraft inspection currency"
    answer: "Transponder check"
    detail: "Required every 24 calendar months under 14 CFR 91.413 before using the transponder."
  - id: av1ate-elt-inspection-battery
    prompt: "AAV1AT**E**S - E"
    prompt_subtitle: "Aircraft inspection currency"
    answer: "ELT inspection / battery rule"
    detail: "Inspect every 12 calendar months. Replace or recharge the battery after 1 cumulative hour of use or at 50% of useful life."
  - id: av1ate-static-altimeter-check
    prompt: "AAV1ATE**S** - S"
    prompt_subtitle: "Aircraft inspection currency"
    answer: "Static system check"
    detail: "Required every 24 calendar months for IFR operations under 14 CFR 91.411."
