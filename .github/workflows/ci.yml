name: flashcards

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # Every PR (and push) must compile cleanly. A green check here means the
  # deck is guaranteed to compile into the published catalog.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run validate

  # On merge to main, compile the catalog and publish it to the CloudFront CDN
  # the Fledge app fetches at runtime. PRs do NOT publish — only validate.
  # Gated behind the FLASHCARDS_PUBLISH_ENABLED repo variable so CI stays green
  # until publishing is turned on (Settings → Secrets and variables → Actions →
  # Variables → set FLASHCARDS_PUBLISH_ENABLED = true).
  #
  # Auth is GitHub OIDC (no long-lived keys): the workflow assumes the IAM role
  # GitHubActions-FledgeFlashcards, which is trusted only for this repo and may
  # only PutObject to the catalog bucket + invalidate this one distribution.
  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.FLASHCARDS_PUBLISH_ENABLED == 'true'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build   # writes dist/flashcards.json
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::953352003729:role/GitHubActions-FledgeFlashcards
          aws-region: us-east-2
      - name: Upload catalog to S3 origin
        run: |
          aws s3 cp dist/flashcards.json \
            s3://fledge-flashcards-data/flashcards.json \
            --content-type application/json --cache-control "max-age=300"
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E3B8GX2GXJCWM5 --paths "/flashcards.json"
